<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mechanic Carlos</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
html,body{height:100%;margin:0;background:#060810;color:#dce8f5;font-family:-apple-system,system-ui,sans-serif}
.wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;box-sizing:border-box}
h1{font-size:20px;margin:0 0 8px}
p{font-size:14px;color:#7d8fa8;line-height:1.6;margin:0 0 24px;max-width:280px}
button{height:48px;padding:0 32px;font-size:15px;font-weight:600;color:#fff;background:#4a9eff;border:none;border-radius:10px;cursor:pointer;font-family:inherit}
.icon{font-size:40px;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>No connection</h1>
  <p>Carlos needs the internet to diagnose your car. Check your signal or Wi-Fi and try again.</p>
  <button onclick="window.location.href='https://mchaniccarlos.com'">Try Again</button>
</div>
</body>
</html>
